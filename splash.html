<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .loader {
            text-align: center;
        }
        .logo {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        .text {
            color: white;
            font-size: 14px;
        }
        .error {
            color: #ff6b6b;
            margin-top: 20px;
            display: none;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #667eea;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="logo">NexVoice</div>
        <div class="spinner"></div>
        <div class="text">Подключение к серверу...</div>
        <div class="error">Не удалось подключиться. Проверьте интернет.</div>
        <button onclick="location.reload()" style="display: none;">Повторить</button>
    </div>
    <script>
        setTimeout(() => {
            document.querySelector('.text').innerHTML = 'Сервер не отвечает. Проверьте интернет.';
            document.querySelector('.error').style.display = 'block';
            document.querySelector('button').style.display = 'inline-block';
        }, 10000);
    </script>
</body>
</html>
